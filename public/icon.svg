  <circle cx="216" cy="190" r="14" fill="#fff" opacity="0.9"/>
  <!-- Dots in right bubble -->
  <circle cx="296" cy="322" r="14" fill="#fff" opacity="0.9"/>
  <circle cx="336" cy="322" r="14" fill="#fff" opacity="0.9"/>
  <circle cx="376" cy="322" r="14" fill="#fff" opacity="0.9"/>
